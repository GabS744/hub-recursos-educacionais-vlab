name: Backend CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest 

    steps:
    - name: Clonar o repositório
      uses: actions/checkout@v4

    - name: Configurar o Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Instalar Dependências do Back-end
      run: |
        python -m pip install --upgrade pip
        cd backend
        pip install -r requirements.txt
        
    - name: Checagem de Sintaxe (Dry Run)
      run: |
        cd backend
        # Tenta compilar o arquivo main.py para garantir que não há erros fatais de sintaxe ou importação
        python -m py_compile main.py